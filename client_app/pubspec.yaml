name: iot_smarthome_app
description: A new Flutter project for controlling IoT devices.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=2.19.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  shared_preferences: ^2.2.2
  # For making HTTP requests to the backend server

  # For beautiful fonts
  google_fonts: ^4.0.3

  # AI Voice Assistant
  speech_to_text: 6.5.0
  flutter_tts: ^4.0.2

  # Realtime WebSocket
  web_socket_channel: ^2.4.0
  provider: ^6.1.5+1
  awesome_notifications: ^0.11.0
  flutter_mjpeg: ^2.0.3

dependency_overrides:
  http: ^1.2.0

  # State management (optional, but recommended for larger apps)
  # provider: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/logo.png
